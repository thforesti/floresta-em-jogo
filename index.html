<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floresta em Jogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d2818; overflow: hidden; }

    /* ── UI overlay — flutua acima do canvas Phaser ── */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      font-family: 'Inter', sans-serif;
    }

    /* ── Menu flutuante dos hexágonos ── */
    #hex-menu {
      position: fixed;
      width: 320px;
      background: #122a1c;
      border: 1px solid #2d6a4f;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: all;
      z-index: 200;
    }
    #hex-menu .hm-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #d8f3dc;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    #hex-menu .hm-desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #74c69d;
      line-height: 1.4;
    }
    #hex-menu .hm-close {
      background: none;
      border: none;
      color: #74c69d;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      margin-left: 12px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    #hex-menu .hm-close:hover { color: #d8f3dc; }
    #hex-menu .hm-sep {
      height: 1px;
      background: #1e4030;
      margin: 12px 0;
    }
    #hex-menu .hm-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #hex-menu .hm-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #0d2818;
      border: 1px solid #1e4030;
      border-radius: 10px;
      width: 100%;
      text-align: left;
      transition: border-color 0.12s, background 0.12s;
    }
    #hex-menu .hm-btn:not(.hm-btn--bloq) {
      cursor: pointer;
    }
    #hex-menu .hm-btn:not(.hm-btn--bloq):hover {
      border-color: #52b788;
      background: #1b4332;
    }
    #hex-menu .hm-btn--bloq {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #hex-menu .hm-ico {
      width: 36px; height: 36px;
      background: #1b4332;
      border: 1px solid #2d6a4f;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    #hex-menu .hm-body {
      flex: 1;
      min-width: 0;
    }
    #hex-menu .hm-label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #d8f3dc;
      margin-bottom: 2px;
      line-height: 1.3;
    }
    #hex-menu .hm-bdesc {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #74c69d;
    }
    #hex-menu .hm-custo {
      text-align: right;
      flex-shrink: 0;
    }
    #hex-menu .hm-custo-val {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #e76f51;
    }
    #hex-menu .hm-receita {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #52b788;
    }
    #hex-menu .hm-aviso {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #e76f51;
      font-style: italic;
      padding: 4px 8px;
      margin-top: -4px;
    }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <!-- ── Painel superior ── -->
    <div id="hud-superior" style="
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: #0d2818;
      border-bottom: 1px solid #1e4030;
      display: flex;
      align-items: center;
      z-index: 150;
      pointer-events: all;
    "></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
